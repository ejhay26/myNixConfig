decoration {
    rounding = 10
    
    blur {
        enabled = true
        size = 8
        passes = 4 # Layered blur for depth
        new_optimizations = true
        ignore_opacity = true
        xray = true # Keep text/content solid
        # noise = 0.02
        vibrancy = 0.1696
        # contrast = 1
        brightness = 1.2
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a1aee)
    }

    active_opacity = 0.90
    inactive_opacity = 0.90
}
