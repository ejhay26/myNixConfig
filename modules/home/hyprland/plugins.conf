# ===================================================================
# Configuration for Hyprbar, Hyprexpo, and Minimize
# ===================================================================

# 1. Configure hyprbar (the plugin is loaded automatically by your NixOS config)
plugin {
    hyprbars {
        bar_height = 20
        bar_color = rgba(20, 20, 20, 0.8)
        bar_part_of_window = true
        bar_precedence = true
        col.rounding = 8

        # NOTE: you need a Nerd Font for these icons to display correctly.
        buttons {
            button {
                icon = 
                action = exec, minimize
                hover_icon = 
                box_color = rgba(255, 255, 0, 0.7)
                hover_box_color = rgba(255, 255, 0, 1)
                box_size = 10 4 # width height (rectangular)
                hover_box_size = 10 10 # width height (square on hover)
            }
            button {
                icon = 
                action = togglefloating
                hover_icon = 
                box_color = rgba(0, 255, 0, 0.7)
                hover_box_color = rgba(0, 255, 0, 1)
                box_size = 10 4
                hover_box_size = 10 10
            }
            button {
                icon = 
                action = killactive
                hover_icon = 
                box_color = rgba(255, 0, 0, 0.7)
                hover_box_color = rgba(255, 0, 0, 1)
                box_size = 10 4
                hover_box_size = 10 10
            }
        }
    }

    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current
        enable_gesture = true
#        gesture_fingers = 3
 #       gesture_distance = 300
  #      gesture_positive = true
    }
}
