# ═══════════════════════════════════════════════════════════════════════
#                        Hyprland Keybindings
# ═══════════════════════════════════════════════════════════════════════

# ┌─────────────────────────────────────────────────────────────────────┐
# │                        Application Launchers                        │
# └─────────────────────────────────────────────────────────────────────┘

# Terminal
bind = SUPER, T, exec, kitty

# File Manager
bind = SUPER, E, exec, dolphin

# Logout / Exit
bind = SUPER, M, exec, hyprctl dispatch exit

# Toggle Waybar
bind = SUPER, Y, exec, pkill waybar || waybar

# Toggle Noctalia Shell
bind = SUPER, U, exec, pkill noctalia-shell || noctalia-shell

# bind = SUPER, I, exec, noctalia-shell ipc call bar toggle

# Launcher / Rofi
# bind = SUPER, Tab, exec, rofi -show drun
# this is noctallia-shell's built-in launcher, which is faster and more feature-rich than rofi
bind = SUPER, Tab, exec, noctalia-shell ipc call launcher toggle

# Rofi Calculator
# bind = SUPER, C, exec, rofi -show calc -modi calc -no-show-match -no-sort


# Wallpaper Selector
# bind = SUPER, W, exec, ~/.config/hypr/scripts/wallpaper-selector.sh
bind = SUPER, W, exec, noctalia-shell ipc call wallpaper toggle
# Rofi Emoji Picker
# bind = SUPER, period, exec, rofi -show emoji -modi emoji
# this is noctalia-shell's built-in emoji picker, which is faster and more feature-rich than rofi
bind = SUPER, period, exec, noctalia-shell ipc call launcher emoji

bind = SUPER, ESCAPE, exec, noctalia-shell ipc call systemMonitor toggle

bind = SUPER, I, exec, noctalia-shell ipc call settings toggle

# ┌─────────────────────────────────────────────────────────────────────┐
# │                    Screenshot and Clipboard                         │
# └─────────────────────────────────────────────────────────────────────┘

# Screenshot a region
bind = alt, PRINT, exec, hyprshot -m region -z -o /home/$USER/Pictures/Screenshots

# Screenshot entire Monitor
bind = shift, PRINT, exec, hyprshot -m output -c -m active -o /home/$USER/Pictures/Screenshots

# Screenshot a window
bind = ctrl, PRINT, exec, hyprshot -m window -z -o /home/$USER/Pictures/Screenshots

# Clipboard
# bind = SUPER, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy
# This is noctalia-shell's built-in clipboard manager, which is faster and more feature-rich than cliphist
bind = SUPER, V, exec, noctalia-shell ipc call launcher clipboard

# ┌─────────────────────────────────────────────────────────────────────┐
# │                       Window Management                             │
# └─────────────────────────────────────────────────────────────────────┘

# Close active window
bind = SUPER, Q, killactive

# Toggle Fullscreen
bind = SUPER, F, fullscreen

# Toggle floating/tiled
bind = SUPER, SPACE, togglefloating

# Toggle all floating (Workspace mode)
bind = SUPER SHIFT, SPACE, workspaceopt, allfloat

# Bindings for Plugins
# bind = SUPER, grave, hyprexpo:expo, toggle
bind = SUPER, H, exec, minimize

# Special Workspace for Minimize

# Toggle the visibility of the minimized workspace
bind = SUPER, N, togglespecialworkspace, minimized

# ┌─────────────────────────────────────────────────────────────────────┐
# │                Hardware Controls (Brightness & Volume)              │
# └─────────────────────────────────────────────────────────────────────┘

# Increase Brightness
binde = , XF86MonBrightnessUp, exec, brightnessctl s 10%+

# Decrease Brightness
binde = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Mute Volume
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Increase Volume
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+


# Decrease Volume
binde = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%-

# Media control ( Next, Prev, Play/Pause)
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

bind = SUPER, L, exec, noctalia-shell ipc call lockScreen lock




# ┌─────────────────────────────────────────────────────────────────────┐
# │                        Mouse Binds (Floating)                       │
# └─────────────────────────────────────────────────────────────────────┘

# Move floating window
bindm = SUPER, mouse:272, movewindow

# Resize floating window
bindm = SUPER, mouse:273, resizewindow

# ┌─────────────────────────────────────────────────────────────────────┐
# │                      Window Resizing                                │
# └─────────────────────────────────────────────────────────────────────┘

# Resize with arrow keys (hold SUPER)
binde = SUPER, left,  resizeactive, -50 0
binde = SUPER, right, resizeactive, 50 0
binde = SUPER, up,    resizeactive, 0 -50
binde = SUPER, down,  resizeactive, 0 50

# ┌─────────────────────────────────────────────────────────────────────┐
# │                     Window Movement (Tiled)                         │
# └─────────────────────────────────────────────────────────────────────┘

# I/K = up/down, J/L = left/right
bind = SUPER, I, movewindow, u
bind = SUPER, K, movewindow, d
bind = SUPER, J, movewindow, l
bind = SUPER, L, movewindow, r

# ┌─────────────────────────────────────────────────────────────────────┐
# │                     Workspace Switching                             │
# └─────────────────────────────────────────────────────────────────────┘

bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5
bind = ALT, 6, workspace, 6
bind = ALT, 7, workspace, 7
bind = ALT, 8, workspace, 8
bind = ALT, 9, workspace, 9
bind = ALT, 0, workspace, 10

# ┌─────────────────────────────────────────────────────────────────────┐
# │                  Move Window to Workspace                           │
# └─────────────────────────────────────────────────────────────────────┘

bind = ALT SHIFT, 1, movetoworkspace, 1
bind = ALT SHIFT, 2, movetoworkspace, 2
bind = ALT SHIFT, 3, movetoworkspace, 3
bind = ALT SHIFT, 4, movetoworkspace, 4
bind = ALT SHIFT, 5, movetoworkspace, 5
bind = ALT SHIFT, 6, movetoworkspace, 6
bind = ALT SHIFT, 7, movetoworkspace, 7
bind = ALT SHIFT, 8, movetoworkspace, 8
bind = ALT SHIFT, 9, movetoworkspace, 9
bind = ALT SHIFT, 0, movetoworkspace, 10
