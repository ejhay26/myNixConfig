input {
    kb_layout = us
    # follow_mouse = 2 # Click to focus
    float_switch_override_focus = 0
}

general {
    gaps_in = 8
    gaps_out = 12 # the gaps around the entire tiles
    border_size = 0
    # Not too bright borders (muted teal/green)
    col.active_border = rgba(ffffffff) 45deg #rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
}

env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}
