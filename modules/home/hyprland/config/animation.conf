animations {
    enabled = true
    # Physics based bezier
    # bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = overshoot, 0.34, 1.4, 0.64, 1

    # Slide in/out based on location, no fade
    animation = fade, 3
    animation = windows, 1, 5, overshoot, slide
    animation = fadeOut, 1, 20, default
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default

    # workspace animation
    animation = workspaces, 1, 6, overshoot, slide
}
